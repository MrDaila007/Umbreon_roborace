name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── Code style review (inline PR annotations) ────────────────────
  style-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install reviewdog and ruff
        run: |
          pip install ruff
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Ruff review (Python)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check --output-format rdjson dashboard/ simulation/ ros2/ \
            | reviewdog -f rdjson -reporter=github-pr-review -level=warning

      - name: Install cppcheck
        run: sudo apt-get install -y --no-install-recommends cppcheck

      - name: cppcheck review (C++)
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cppcheck --language=c++ --std=c++17 --enable=warning,performance \
            --template='{file}:{line}:{column}: {severity}: {message} [{id}]' \
            --suppress=missingIncludeSystem \
            *.ino *.h 2>&1 \
            | reviewdog -efm='%f:%l:%c: %t%*[^:]: %m' -reporter=github-pr-review -level=warning

  # ── Firmware compilation ──────────────────────────────────────────
  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Cache board package
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-rp2040-${{ hashFiles('Umbreon_roborace.ino') }}
          restore-keys: arduino-rp2040-

      - name: Install rp2040 board package
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index
          arduino-cli core install rp2040:rp2040

      - name: Compile firmware
        run: arduino-cli compile -b rp2040:rp2040:rpipico2 .

  # ── Python lint ───────────────────────────────────────────────────
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint dashboard and simulation
        run: ruff check dashboard/ simulation/

  # ── Python import check ──────────────────────────────────────────
  python-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r dashboard/requirements.txt

      - name: Check dashboard imports
        working-directory: dashboard
        run: |
          python -c "import protocol; print('protocol OK')"
          python -c "import car_config; print('car_config OK')"
          python -c "import connection; print('connection OK')"
          python -c "import telemetry; print('telemetry OK')"
          python -c "import settings_file; print('settings_file OK')"

      - name: Check simulation imports
        working-directory: simulation
        run: python -c "import sim; print('sim OK')"

  # ── ROS2 Docker build ────────────────────────────────────────────
  ros2-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ROS2 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ros2/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
